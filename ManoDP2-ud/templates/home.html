<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MedAI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */

body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(270deg,#0f172a,#020617,#0f172a);
    background-size:400% 400%;
    animation: gradientMove 15s ease infinite;
    color:white;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}


/* ===== NAVBAR ===== */

.navbar{
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.05);
    border-bottom:1px solid rgba(255,255,255,0.1);
}

.navbar-brand{
    font-weight:700;
    font-size:22px;
    color:#14b8a6 !important;
}

.nav-link{
    color:white !important;
    margin-left:10px;
}

.nav-link:hover{
    color:#14b8a6 !important;
}


/* ===== CONTAINER ===== */

.container-box{
    max-width:1200px;
    margin:auto;
    margin-top:40px;
}


/* ===== GLASS CARD ===== */

.card{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    border-radius:15px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}


/* ===== INPUT ===== */

input, select{
    background:rgba(255,255,255,0.05) !important;
    border:none !important;
    color:white !important;
}

input::placeholder{
    color:#ccc;
}


/* ===== BUTTON ===== */

button, .btn{
    background:#14b8a6;
    border:none;
    padding:10px 20px;
    border-radius:8px;
    font-weight:500;
    transition:0.3s;
}

button:hover, .btn:hover{
    background:#0f766e;
}


/* ===== FLOATING MEDICINE ICONS ===== */

.pill{
position:fixed;
width:40px;
opacity:0.15;
animation:float 10s infinite linear;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-100vh)}
}

</style>

</head>

<body>


<!-- Floating Background Pills -->

<img src="https://cdn-icons-png.flaticon.com/512/2921/2921822.png" class="pill" style="left:10%">
<img src="https://cdn-icons-png.flaticon.com/512/2921/2921822.png" class="pill" style="left:50%; animation-delay:4s;">
<img src="https://cdn-icons-png.flaticon.com/512/2921/2921822.png" class="pill" style="left:80%; animation-delay:7s;">



<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg">

<div class="container">

<a class="navbar-brand" href="/">MedAI</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav ms-auto">

{% if current_user.is_authenticated %}

<li class="nav-item">
<a class="nav-link" href="/dashboard">Dashboard</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/upload_medicine">Identify Medicine</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/my_prescriptions">Prescriptions</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/logout">Logout</a>
</li>

<li class="nav-item">
<a class="nav-link">👤 {{ current_user.username }}</a>
</li>

{% else %}

<li class="nav-item">
<a class="nav-link" href="/">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/login">Login</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/register">Register</a>
</li>

{% endif %}

</ul>

</div>

</div>

</nav>



<!-- PAGE CONTENT -->

<div class="container-box">

{% block content %}{% endblock %}

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
