<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users | ManoDP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/forms.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar (Admin) -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-prescription-bottle-alt"></i>
                    <h2>ManoDP</h2>
                </div>
                <button class="toggle-sidebar" onclick="toggleSidebar()">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            
            <div class="user-info">
                <img src="https://ui-avatars.com/api/?name=Admin+User&background=ef6c00&color=fff" alt="Admin">
                <div class="user-details">
                    <h4>Admin User</h4>
                    <p>System Administrator</p>
                    <span class="role-badge admin-badge">
                        <i class="fas fa-cogs"></i> Admin
                    </span>
                </div>
            </div>
            
            <nav class="sidebar-menu">
                <a href="dashboard-admin.html">
                    <i class="fas fa-home"></i> <span>Dashboard</span>
                </a>
                <a href="manage-users.html" class="active">
                    <i class="fas fa-users"></i> <span>Manage Users</span>
                </a>
                <a href="view-prescriptions.html">
                    <i class="fas fa-file-prescription"></i> <span>All Prescriptions</span>
                </a>
                <a href="#" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> <span>Logout</span>
                </a>
            </nav>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <header class="main-header">
                <div class="header-left">
                    <h1>User Management</h1>
                    <p>Manage all system users and permissions</p>
                </div>
                <div class="header-right">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="userSearch" placeholder="Search users...">
                    </div>
                    <button class="btn-primary" onclick="openAddUserModal()">
                        <i class="fas fa-user-plus"></i> Add New User
                    </button>
                </div>
            </header>
            
            <!-- User Filters -->
            <div class="filters-bar">
                <select id="roleFilter" onchange="filterUsers()">
                    <option value="all">All Roles</option>
                    <option value="doctor">Doctors</option>
                    <option value="patient">Patients</option>
                    <option value="pharmacist">Pharmacists</option>
                    <option value="admin">Admins</option>
                </select>
                
                <select id="statusFilter" onchange="filterUsers()">
                    <option value="all">All Status</option>
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                    <option value="pending">Pending</option>
                </select>
                
                <button class="btn-secondary" onclick="exportUsers()">
                    <i class="fas fa-download"></i> Export Users
                </button>
            </div>
            
            <!-- Users Table -->
            <div class="card">
                <div class="card-header">
                    <h3><i class="fas fa-users"></i> System Users</h3>
                    <span class="badge" id="userCount">245 users</span>
                </div>
                <div class="card-body">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>
                                    <input type="checkbox" id="selectAll" onchange="toggleSelectAll()">
                                </th>
                                <th>User</th>
                                <th>Role</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Status</th>
                                <th>Joined</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody">
                            <!-- Will be populated by JavaScript -->
                            <tr>
                                <td colspan="8" class="loading-text">
                                    <i class="fas fa-spinner fa-spin"></i> Loading users...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    
                    <!-- Pagination -->
                    <div class="pagination" id="pagination">
                        <button class="page-btn" onclick="changePage(-1)">
                            <i class="fas fa-chevron-left"></i>
                        </button>
                        <span class="page-info">Page <span id="currentPage">1</span> of <span id="totalPages">5</span></span>
                        <button class="page-btn" onclick="changePage(1)">
                            <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- Bulk Actions -->
            <div class="bulk-actions" id="bulkActions" style="display: none;">
                <div class="bulk-selected">
                    <span id="selectedCount">0</span> users selected
                </div>
                <div class="bulk-buttons">
                    <button class="btn-secondary" onclick="bulkActivate()">
                        <i class="fas fa-check-circle"></i> Activate
                    </button>
                    <button class="btn-secondary" onclick="bulkDeactivate()">
                        <i class="fas fa-ban"></i> Deactivate
                    </button>
                    <button class="btn-secondary" onclick="bulkDelete()">
                        <i class="fas fa-trash"></i> Delete
                    </button>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Add User Modal -->
    <div class="modal-overlay" id="addUserModal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-user-plus"></i> Add New User</h3>
                <button class="modal-close" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="addUserForm" onsubmit="addNewUser(event)">
                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-user"></i> Full Name</label>
                            <input type="text" id="newUserName" required>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-envelope"></i> Email</label>
                            <input type="email" id="newUserEmail" required>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-phone"></i> Phone Number</label>
                            <input type="tel" id="newUserPhone" required>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-key"></i> Password</label>
                            <input type="password" id="newUserPassword" required>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-user-tag"></i> Role</label>
                            <select id="newUserRole" required>
                                <option value="">Select Role</option>
                                <option value="doctor">Doctor</option>
                                <option value="patient">Patient</option>
                                <option value="pharmacist">Pharmacist</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>
                        <div class="form-group" id="specializationField" style="display: none;">
                            <label><i class="fas fa-stethoscope"></i> Specialization</label>
                            <input type="text" id="newUserSpecialization">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-map-marker-alt"></i> Address</label>
                        <textarea id="newUserAddress" rows="3"></textarea>
                    </div>
                    
                    <div class="form-actions">
                        <button type="button" class="btn-secondary" onclick="closeModal()">
                            Cancel
                        </button>
                        <button type="submit" class="btn-success">
                            <i class="fas fa-save"></i> Create User
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <!-- Edit User Modal -->
    <div class="modal-overlay" id="editUserModal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-user-edit"></i> Edit User</h3>
                <button class="modal-close" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" id="editUserForm">
                <!-- Will be populated by JavaScript -->
            </div>
        </div>
    </div>
    
    <script src="js/auth.js"></script>
    <script src="js/script.js"></script>
    <script>
        // User Management Functions
        let allUsers = [];
        let filteredUsers = [];
        let currentPage = 1;
        const usersPerPage = 10;
        let selectedUsers = new Set();
        
        document.addEventListener('DOMContentLoaded', function() {
            if (checkAuth() !== 'admin') {
                window.location.href = 'index.html';
                return;
            }
            
            loadUsers();
            
            // Setup search
            const searchInput = document.getElementById('userSearch');
            searchInput.addEventListener('input', debounce(searchUsers, 300));
            
            // Show/hide specialization field based on role
            document.getElementById('newUserRole').addEventListener('change', function() {
                const specializationField = document.getElementById('specializationField');
                specializationField.style.display = this.value === 'doctor' ? 'block' : 'none';
            });
        });
        
        function loadUsers() {
            // In real app, this would fetch from backend
            // Generate demo users
            setTimeout(() => {
                allUsers = generateDemoUsers();
                filteredUsers = [...allUsers];
                renderUsersTable();
                updatePagination();
                updateUserCount();
            }, 500);
        }
        
        function generateDemoUsers() {
            const roles = ['doctor', 'patient', 'pharmacist', 'admin'];
            const statuses = ['active', 'inactive', 'pending'];
            const names = ['Dr. Ramesh Kumar', 'Rajesh Kumar', 'Meena Sharma', 'Arun Jain', 'Priya Singh', 'Amit Sharma', 'Dr. Priya Singh', 'Dr. Arvind Patel'];
            const specializations = ['Cardiologist', 'Dermatologist', 'Pediatrician', 'Neurologist', 'Orthopedic'];
            
            const users = [];
            
            for (let i = 1; i <= 50; i++) {
                const role = roles[Math.floor(Math.random() * roles.length)];
                const status = statuses[Math.floor(Math.random() * statuses.length)];
                const name = names[Math.floor(Math.random() * names.length)];
                
                users.push({
                    id: i,
                    name: name,
                    email: `${name.toLowerCase().replace(/[^a-z]/g, '')}${i}@manodp.com`,
                    phone: `9876543${i.toString().padStart(3, '0')}`,
                    role: role,
                    status: status,
                    joined: `2025-${String(Math.floor(Math.random() * 12) + 1).padStart(2, '0')}-${String(Math.floor(Math.random() * 28) + 1).padStart(2, '0')}`,
                    address: 'Sample address',
                    specialization: role === 'doctor' ? specializations[Math.floor(Math.random() * specializations.length)] : null
                });
            }
            
            return users;
        }
        
        function renderUsersTable() {
            const tbody = document.getElementById('usersTableBody');
            const startIndex = (currentPage - 1) * usersPerPage;
            const endIndex = startIndex + usersPerPage;
            const pageUsers = filteredUsers.slice(startIndex, endIndex);
            
            if (pageUsers.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8" class="no-results">
                            <i class="fas fa-user-slash"></i>
                            <p>No users found</p>
                        </td>
                    </tr>
                `;
                return;
            }
            
            tbody.innerHTML = pageUsers.map(user => `
                <tr>
                    <td>
                        <input type="checkbox" class="user-checkbox" 
                               data-id="${user.id}" 
                               onchange="toggleUserSelection(${user.id})"
                               ${selectedUsers.has(user.id) ? 'checked' : ''}>
                    </td>
                    <td>
                        <div class="patient-cell">
                            <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=${getRoleColor(user.role)}&color=fff" 
                                 alt="${user.name}">
                            <div>
                                <strong>${user.name}</strong>
                                ${user.specialization ? `<small>${user.specialization}</small>` : ''}
                            </div>
                        </div>
                    </td>
                    <td>
                        <span class="role-badge ${user.role}-badge">
                            <i class="fas ${getRoleIcon(user.role)}"></i>
                            ${user.role.charAt(0).toUpperCase() + user.role.slice(1)}
                        </span>
                    </td>
                    <td>${user.email}</td>
                    <td>${user.phone}</td>
                    <td>
                        <span class="status ${user.status}">
                            ${user.status.charAt(0).toUpperCase() + user.status.slice(1)}
                        </span>
                    </td>
                    <td>${formatDate(user.joined)}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn-small" onclick="editUser(${user.id})">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn-small" onclick="toggleUserStatus(${user.id}, '${user.status}')">
                                <i class="fas ${user.status === 'active' ? 'fa-ban' : 'fa-check'}"></i>
                            </button>
                            <button class="btn-small delete-btn" onclick="deleteUser(${user.id})">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }
        
        function getRoleColor(role) {
            const colors = {
                doctor: '1a73e8',
                patient: 'ff9800',
                pharmacist: '2e7d32',
                admin: 'ef6c00'
            };
            return colors[role] || '666666';
        }
        
        function getRoleIcon(role) {
            const icons = {
                doctor: 'fa-user-md',
                patient: 'fa-user-injured',
                pharmacist: 'fa-prescription-bottle',
                admin: 'fa-cogs'
            };
            return icons[role] || 'fa-user';
        }
        
        function filterUsers() {
            const role = document.getElementById('roleFilter').value;
            const status = document.getElementById('statusFilter').value;
            
            filteredUsers = allUsers.filter(user => {
                const roleMatch = role === 'all' || user.role === role;
                const statusMatch = status === 'all' || user.status === status;
                return roleMatch && statusMatch;
            });
            
            currentPage = 1;
            renderUsersTable();
            updatePagination();
            updateUserCount();
        }
        
        function searchUsers() {
            const searchTerm = document.getElementById('userSearch').value.toLowerCase();
            
            if (!searchTerm) {
                filteredUsers = [...allUsers];
            } else {
                filteredUsers = allUsers.filter(user =>
                    user.name.toLowerCase().includes(searchTerm) ||
                    user.email.toLowerCase().includes(searchTerm) ||
                    user.phone.includes(searchTerm) ||
                    user.role.toLowerCase().includes(searchTerm)
                );
            }
            
            currentPage = 1;
            renderUsersTable();
            updatePagination();
            updateUserCount();
        }
        
        function updatePagination() {
            const totalPages = Math.ceil(filteredUsers.length / usersPerPage);
            
            document.getElementById('currentPage').textContent = currentPage;
            document.getElementById('totalPages').textContent = totalPages;
            
            // Hide pagination if only one page
            document.getElementById('pagination').style.display = totalPages <= 1 ? 'none' : 'flex';
        }
        
        function changePage(delta) {
            const totalPages = Math.ceil(filteredUsers.length / usersPerPage);
            const newPage = currentPage + delta;
            
            if (newPage >= 1 && newPage <= totalPages) {
                currentPage = newPage;
                renderUsersTable();
                updatePagination();
            }
        }
        
        function updateUserCount() {
            document.getElementById('userCount').textContent = `${filteredUsers.length} users`;
        }
        
        function toggleSelectAll() {
            const selectAll = document.getElementById('selectAll').checked;
            const checkboxes = document.querySelectorAll('.user-checkbox');
            const pageUsers = filteredUsers.slice(
                (currentPage - 1) * usersPerPage,
                currentPage * usersPerPage
            );
            
            if (selectAll) {
                pageUsers.forEach(user => selectedUsers.add(user.id));
            } else {
                pageUsers.forEach(user => selectedUsers.delete(user.id));
            }
            
            checkboxes.forEach(cb => cb.checked = selectAll);
            updateBulkActions();
        }
        
        function toggleUserSelection(userId) {
            if (selectedUsers.has(userId)) {
                selectedUsers.delete(userId);
            } else {
                selectedUsers.add(userId);
            }
            updateBulkActions();
        }
        
        function updateBulkActions() {
            const bulkActions = document.getElementById('bulkActions');
            const selectedCount = document.getElementById('selectedCount');
            
            selectedCount.textContent = selectedUsers.size;
            
            if (selectedUsers.size > 0) {
                bulkActions.style.display = 'flex';
            } else {
                bulkActions.style.display = 'none';
            }
            
            // Update select all checkbox
            const pageUsers = filteredUsers.slice(
                (currentPage - 1) * usersPerPage,
                currentPage * usersPerPage
            );
            const allSelected = pageUsers.length > 0 && 
                               pageUsers.every(user => selectedUsers.has(user.id));
            document.getElementById('selectAll').checked = allSelected;
        }
        
        function bulkActivate() {
            if (selectedUsers.size === 0) return;
            
            if (confirm(`Activate ${selectedUsers.size} user(s)?`)) {
                selectedUsers.forEach(id => {
                    const user = allUsers.find(u => u.id === id);
                    if (user) user.status = 'active';
                });
                renderUsersTable();
                showAlert(`${selectedUsers.size} user(s) activated`, 'success');
                selectedUsers.clear();
                updateBulkActions();
            }
        }
        
        function bulkDeactivate() {
            if (selectedUsers.size === 0) return;
            
            if (confirm(`Deactivate ${selectedUsers.size} user(s)?`)) {
                selectedUsers.forEach(id => {
                    const user = allUsers.find(u => u.id === id);
                    if (user) user.status = 'inactive';
                });
                renderUsersTable();
                showAlert(`${selectedUsers.size} user(s) deactivated`, 'success');
                selectedUsers.clear();
                updateBulkActions();
            }
        }
        
        function bulkDelete() {
            if (selectedUsers.size === 0) return;
            
            if (confirm(`Delete ${selectedUsers.size} user(s)? This action cannot be undone.`)) {
                allUsers = allUsers.filter(user => !selectedUsers.has(user.id));
                filteredUsers = filteredUsers.filter(user => !selectedUsers.has(user.id));
                renderUsersTable();
                updatePagination();
                updateUserCount();
                showAlert(`${selectedUsers.size} user(s) deleted`, 'success');
                selectedUsers.clear();
                updateBulkActions();
            }
        }
        
        function openAddUserModal() {
            document.getElementById('addUserModal').style.display = 'flex';
        }
        
        function addNewUser(event) {
            event.preventDefault();
            
            const newUser = {
                id: allUsers.length + 1,
                name: document.getElementById('newUserName').value,
                email: document.getElementById('newUserEmail').value,
                phone: document.getElementById('newUserPhone').value,
                role: document.getElementById('newUserRole').value,
                status: 'active',
                joined: new Date().toISOString().split('T')[0],
                address: document.getElementById('newUserAddress').value,
                specialization: document.getElementById('newUserRole').value === 'doctor' 
                    ? document.getElementById('newUserSpecialization').value 
                    : null
            };
            
            allUsers.unshift(newUser);
            filteredUsers.unshift(newUser);
            
            renderUsersTable();
            updatePagination();
            updateUserCount();
            
            closeModal();
            showAlert(`User ${newUser.name} created successfully!`, 'success');
            
            // Reset form
            document.getElementById('addUserForm').reset();
        }
        
        function editUser(userId) {
            const user = allUsers.find(u => u.id === userId);
            if (!user) return;
            
            const editForm = document.getElementById('editUserForm');
            editForm.innerHTML = `
                <form onsubmit="saveUserChanges(event, ${userId})">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="editUserName" value="${user.name}" required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="editUserEmail" value="${user.email}" required>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="tel" id="editUserPhone" value="${user.phone}" required>
                        </div>
                        <div class="form-group">
                            <label>Role</label>
                            <select id="editUserRole" required>
                                <option value="doctor" ${user.role === 'doctor' ? 'selected' : ''}>Doctor</option>
                                <option value="patient" ${user.role === 'patient' ? 'selected' : ''}>Patient</option>
                                <option value="pharmacist" ${user.role === 'pharmacist' ? 'selected' : ''}>Pharmacist</option>
                                <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>Admin</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Status</label>
                            <select id="editUserStatus">
                                <option value="active" ${user.status === 'active' ? 'selected' : ''}>Active</option>
                                <option value="inactive" ${user.status === 'inactive' ? 'selected' : ''}>Inactive</option>
                                <option value="pending" ${user.status === 'pending' ? 'selected' : ''}>Pending</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-actions">
                        <button type="button" class="btn-secondary" onclick="closeModal()">
                            Cancel
                        </button>
                        <button type="submit" class="btn-success">
                            <i class="fas fa-save"></i> Save Changes
                        </button>
                    </div>
                </form>
            `;
            
            document.getElementById('editUserModal').style.display = 'flex';
        }
        
        function saveUserChanges(event, userId) {
            event.preventDefault();
            
            const userIndex = allUsers.findIndex(u => u.id === userId);
            if (userIndex === -1) return;
            
            allUsers[userIndex] = {
                ...allUsers[userIndex],
                name: document.getElementById('editUserName').value,
                email: document.getElementById('editUserEmail').value,
                phone: document.getElementById('editUserPhone').value,
                role: document.getElementById('editUserRole').value,
                status: document.getElementById('editUserStatus').value
            };
            
            // Update in filtered users too
            const filteredIndex = filteredUsers.findIndex(u => u.id === userId);
            if (filteredIndex !== -1) {
                filteredUsers[filteredIndex] = allUsers[userIndex];
            }
            
            renderUsersTable();
            closeModal();
            showAlert('User updated successfully!', 'success');
        }
        
        function toggleUserStatus(userId, currentStatus) {
            const user = allUsers.find(u => u.id === userId);
            if (!user) return;
            
            const newStatus = currentStatus === 'active' ? 'inactive' : 'active';
            const action = newStatus === 'active' ? 'activate' : 'deactivate';
            
            if (confirm(`${action.charAt(0).toUpperCase() + action.slice(1)} user ${user.name}?`)) {
                user.status = newStatus;
                
                // Update in filtered users too
                const filteredUser = filteredUsers.find(u => u.id === userId);
                if (filteredUser) {
                    filteredUser.status = newStatus;
                }
                
                renderUsersTable();
                showAlert(`User ${action}d successfully`, 'success');
            }
        }
        
        function deleteUser(userId) {
            const user = allUsers.find(u => u.id === userId);
            if (!user) return;
            
            if (confirm(`Delete user ${user.name}? This action cannot be undone.`)) {
                allUsers = allUsers.filter(u => u.id !== userId);
                filteredUsers = filteredUsers.filter(u => u.id !== userId);
                
                renderUsersTable();
                updatePagination();
                updateUserCount();
                showAlert('User deleted successfully', 'success');
            }
        }
        
        function exportUsers() {
            showAlert('Exporting user data to CSV...', 'info');
            // In real app, this would generate and download CSV
        }
        
        function closeModal() {
            document.getElementById('addUserModal').style.display = 'none';
            document.getElementById('editUserModal').style.display = 'none';
        }
        
        // Debounce function
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }
    </script>
    
    <style>
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        
        .page-btn {
